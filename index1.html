<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Taxation</h1>
    </div>
    <div>
        <form id="tax_form">
            <div class="mb-3">
                <label for="salary" class="form-label">Basic salary</label>
                <input type="number" id="basic_salary" class="form-control" min="0">
                
            </div>
            <div class="mb-3">
                <label for="allowances" class="form-label">Benefits</label>
                <input type="number" id="benefits" class="form-control" min="0">
            </div>
            
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>

    <div>
        <table class="table">
            <thead>
                <tr>
                <th scope="col">Tax category</th>
                <th scope="col">Tax Output</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Gross Salary</td>
                    <td id="gross"></td>
                </tr>
                <tr>
                    <td>NHIF</td>
                    <td id="nhif"></td>
                </tr>
                <tr>
                    <td>NSSF</td>
                    <td id="nssf"></td>
                </tr>
                <tr>
                    <td>NHDF</td>
                    <td id="nhdf"></td>
                </tr>
                <tr>
                    <td>Taxable income</td>
                    <td id="taxable_income"></td>
                </tr>
                <tr>
                    <td>PAYE</td>
                    <td id="paye"></td>
                </tr>
                <tr>
                    <td>Net Salary</td>
                    <td id="net_salary"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="tax.js"></script>
    
</body>
</html>
